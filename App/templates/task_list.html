{% extends 'Base.html' %}

{% block content %}
    <table>
        <tr>
            <th>Задача</th>
            <th>Дата окончания</th>
        </tr>
        {% for task in tasks %}
            <tr>
                <td>{{task.title}}</td>
                <td>{{task.date}}</td>
            </tr>
        {% endfor %}
    </table>
{% endblock %}
