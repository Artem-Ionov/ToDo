{% extends 'Base.html' %}

{% block content %}
    <h2>{{task.title}}</h2>
    <p>Заполните новые параметры задачи:</p>
    <form method="post">
        {% csrf_token %}
        {{form.as_p}}
        <button type="submit">Сохранить</button>
    </form>
    <br>
    <a href="{% url 'task_delete' task.id %}">Удалить</a>
{% endblock %}
